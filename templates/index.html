{% extends "base.html" %}
{% block title %}查询 - 猎诈卫士{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between">
            <h1 class="h4 mb-0">🔍 查询</h1>
            {% if not has_db %}<span class="badge text-bg-danger">缺少数据库</span>{% endif %}
          </div>

          <form class="mt-3" method="get" action="{{ url_for('query') }}">
            <div class="input-group input-group-lg">
              <input type="text" class="form-control" name="q" placeholder="输入 ID 或 @用户名" autocomplete="off">
              <button class="btn btn-primary" type="submit">查询</button>
            </div>
          </form>
        </div>
      </div>

      <div class="row mt-3 g-2">
        <div class="col-6"><a class="btn btn-outline-secondary w-100" href="{{ url_for('leaderboard') }}">🏆 赞助</a></div>
        <div class="col-6"><a class="btn btn-outline-secondary w-100" href="{{ url_for('stats') }}">📊 状态</a></div>
      </div>
    </div>
  </div>
{% endblock %}
