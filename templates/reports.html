
{% extends "base.html" %}
{% block content %}
<h2 class="mt-3">已验证案例</h2>
{% if not items or items|length == 0 %}
  <div class="alert alert-secondary mt-3">暂无数据</div>
{% else %}
  <div class="table-responsive mt-3">
    <table class="table table-dark table-striped align-middle">
      <thead><tr><th>#</th><th>账号</th><th>描述</th><th>时间</th><th>编号</th></tr></thead>
      <tbody>
      {% for it in items %}
        <tr>
          <td>{{ loop.index }}</td>
          <td>{{ it.account }}</td>
          <td style="white-space: pre-wrap">{{ it.desc }}</td>
          <td>{{ it.created_at }}</td>
          <td>{{ it.rid }}</td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
{% endif %}
{% endblock %}
