
{% set title = '用户查询' %}
<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户查询</title>
<style>
body{background:#0e0e10;color:#e6e6e6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
.container{max-width:720px;margin:24px auto;padding:0 16px}
.card{background:#17171a;border:1px solid #2a2a2e;border-radius:14px;padding:20px}
label{display:block;margin-bottom:8px;font-size:14px;color:#bdbdbd}
input,select{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid #3a3a40;background:#121215;color:#fff;padding:12px 14px;font-size:16px;outline:none}
button{border:none;border-radius:12px;padding:12px 16px;font-size:16px}
.btn{background:#2563eb;color:#fff}
.msg{margin-top:14px;padding:12px;border-radius:10px}
.msg.bad{background:#5c2c2c;color:#f8d7da}
pre{white-space:pre-wrap;background:#0f0f12;border-radius:10px;padding:12px;border:1px solid #2a2a2e}
</style>
</head><body>
<div class="container">
  <h2>用户查询</h2>
  <div class="card">
    <label>输入 @用户名 或 数字ID</label>
    <input id="q" placeholder="@username 或 123456">
    <div style="height:10px"></div>
    <label>模式</label>
    <select id="mode">
      <option value="auto">自动（先库后实时）</option>
      <option value="realtime">仅实时</option>
      <option value="offline">仅离线</option>
    </select>
    <div style="height:12px"></div>
    <button id="do" class="btn" type="button">查询</button>
    <div id="panel"></div>
  </div>
</div>
<script>
const $ = s=>document.querySelector(s);
$("#do").addEventListener("click", async()=>{
  const panel = $("#panel");
  panel.innerHTML="";
  const q = $("#q").value.trim();
  const mode = $("#mode").value;
  if(!q){ panel.innerHTML='<div class="msg bad">请输入用户</div>'; return; }
  try{
    const res = await fetch("/api/query",{method:"POST",headers:{"Content-Type":"application/json"}, body: JSON.stringify({query:q, mode})});
    const data = await res.json();
    if(!data.ok){
      panel.innerHTML = `<div class="msg bad">${data.msg||'查询失败'}</div>`;
      return;
    }
    panel.innerHTML = '<pre>'+JSON.stringify(data.data,null,2)+'</pre>';
  }catch(e){
    panel.innerHTML = `<div class="msg bad">请求异常：${e}</div>`;
  }
});
</script>
</body></html>
