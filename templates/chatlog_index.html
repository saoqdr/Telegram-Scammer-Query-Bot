{% extends "base.html" %}
{% block title %}聊天记录 - 猎诈卫士{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="d-flex align-items-center justify-content-between">
            <h1 class="h4 mb-0">📜 查询聊天记录</h1>
          </div>

          <form class="mt-3" method="get" action="{{ url_for('chatlog_index') }}">
            <div class="input-group input-group-lg">
              <input type="text" class="form-control" name="q" placeholder="输入 ID 或 @用户名" autocomplete="off">
              <button class="btn btn-primary" type="submit">查询</button>
            </div>
            <div class="form-text mt-2">会显示该用户在哪些群/频道发过什么内容（来自本地数据库）。</div>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
