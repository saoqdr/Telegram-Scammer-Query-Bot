
{% set title = '赞助' %}
<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>赞助</title>
<style>
body{background:#0e0e10;color:#e6e6e6;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto}
.container{max-width:640px;margin:24px auto;padding:0 16px}
.card{background:#17171a;border:1px solid #2a2a2e;border-radius:14px;padding:20px}
label{display:block;margin-bottom:12px;font-size:14px;color:#bdbdbd}
input[type=number]{width:100%;box-sizing:border-box;border-radius:10px;border:1px solid #3a3a40;background:#121215;color:#fff;padding:12px 14px;font-size:16px;outline:none}
button{border:none;border-radius:12px;padding:12px 16px;font-size:16px}
.btn{background:#2563eb;color:#fff}
.msg{margin-top:14px;padding:12px;border-radius:10px}
.msg.ok{background:#0f5132;color:#d1e7dd}
.msg.bad{background:#5c2c2c;color:#f8d7da}
a.btn{display:inline-block;text-decoration:none}
</style>
</head><body>
<div class="container">
  <h2>赞助</h2>
  <div class="card">
    <label>金额 (USDT)</label>
    <input id="amount" type="number" placeholder="例如 1.0" step="0.01" min="0.1">
    <div style="height:12px"></div>
    <button id="create" class="btn" type="button">生成支付链接</button>
    <div id="panel"></div>
  </div>
</div>
<script>
const $ = (s)=>document.querySelector(s);
$("#create").addEventListener("click", async ()=>{
  const amt = $("#amount").value.trim();
  const panel = $("#panel");
  panel.innerHTML = "";
  if(!amt){ panel.innerHTML = '<div class="msg bad">请输入金额</div>'; return; }
  try{
    const res = await fetch("/api/sponsor/create",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({amount: amt})
    });
    const data = await res.json();
    if(data.ok){
      panel.innerHTML = `<div class="msg ok">已生成链接：<br><a class="btn" href="${data.url}" target="_blank" rel="noopener">打开支付</a></div>`;
    }else{
      panel.innerHTML = `<div class="msg bad">${data.msg||'生成失败'}</div>`;
    }
  }catch(e){
    panel.innerHTML = `<div class="msg bad">网络异常：${e}</div>`;
  }
});
</script>
</body></html>
